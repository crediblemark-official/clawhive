name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*' # Memicu alur kerja saat mendorong tag seperti v0.2.0

permissions:
  contents: write # Memerlukan hak tulis untuk membuat GitHub Release dan mengunggah aset

jobs:
  build-release:
    name: Build & Upload Assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: claw10
            asset_name: claw10-linux-x86_64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: claw10
            asset_name: claw10-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: claw10
            asset_name: claw10-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: claw10.exe
            asset_name: claw10-windows-x86_64.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --release --bin claw10 --target ${{ matrix.target }}

      - name: Packaging (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd -

      - name: Packaging (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}
          cd -

      - name: Upload binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
