# ClawHive OS — Provider Configuration
# Copy to `./clawhive.toml` or `~/.config/clawhive/config.toml`
#
# Alias system: creates multiple named configs per provider slot.
# Reference them as `{slot}.{alias}` when selecting models.

# ── Provider Aliases ───────────────────────────────────
# Each alias references a built-in provider slot with a specific model.
# API keys can be literal or reference env vars with `$` prefix.

[alias]

  # OpenAI — multiple aliases for different models
  # Fallback example: tries gpt-4o first, then gpt-4o-mini on same provider,
  # then falls through to groq.llama-fast if all OpenAI models fail.
  [alias.gpt4]
  slot = "openai"
  model = "gpt-4o"
  api_key = "$OPENAI_API_KEY"
  fallback_models = ["gpt-4o-mini"]
  fallback = "groq.llama-fast"

  [alias.cheap]
  slot = "openai"
  model = "gpt-4o-mini"
  api_key = "$OPENAI_API_KEY"

  [alias.reason]
  slot = "openai"
  model = "o3-mini"
  api_key = "$OPENAI_API_KEY"

  # Anthropic (OpenAI-compatible endpoint)
  [alias.sonnet]
  slot = "anthropic"
  model = "claude-sonnet-4-20250514"
  api_key = "$ANTHROPIC_API_KEY"

  [alias.haiku]
  slot = "anthropic"
  model = "claude-3.5-haiku"
  api_key = "$ANTHROPIC_API_KEY"

  # Groq — extremely fast inference
  [alias.llama-fast]
  slot = "groq"
  model = "llama-3.3-70b-versatile"
  api_key = "$GROQ_API_KEY"

  [alias.llama-instant]
  slot = "groq"
  model = "llama-3.1-8b-instant"
  api_key = "$GROQ_API_KEY"

  # DeepSeek
  [alias.deepseek-chat]
  slot = "deepseek"
  model = "deepseek-chat"
  api_key = "$DEEPSEEK_API_KEY"

  [alias.deepseek-r1]
  slot = "deepseek"
  model = "deepseek-reasoner"
  api_key = "$DEEPSEEK_API_KEY"

  # NVIDIA NIM
  [alias.nvidia-kimi]
  slot = "nvidia"
  model = "moonshotai/kimi-k2.6"
  api_key = "$NVIDIA_API_KEY"

  # Together AI
  [alias.together-llama]
  slot = "together"
  model = "meta-llama/Llama-3.3-70B-Instruct-Turbo"
  api_key = "$TOGETHER_API_KEY"

  # Fireworks AI
  [alias.fireworks-llama]
  slot = "fireworks"
  model = "accounts/fireworks/models/llama-v3p3-70b-instruct"
  api_key = "$FIREWORKS_API_KEY"

  # xAI (Grok)
  [alias.grok]
  slot = "xai"
  model = "grok-3-beta"
  api_key = "$XAI_API_KEY"

  # Perplexity (with web search)
  [alias.perplexity]
  slot = "perplexity"
  model = "sonar-pro"
  api_key = "$PERPLEXITY_API_KEY"

  # OpenRouter — unified access to 300+ models
  [alias.or-gpt4]
  slot = "openrouter"
  model = "openai/gpt-4o"
  api_key = "$OPENROUTER_API_KEY"

  [alias.or-claude]
  slot = "openrouter"
  model = "anthropic/claude-sonnet-4"
  api_key = "$OPENROUTER_API_KEY"

  # Mistral AI
  [alias.mistral-large]
  slot = "mistral"
  model = "mistral-large-2411"
  api_key = "$MISTRAL_API_KEY"

  [alias.codestral]
  slot = "mistral"
  model = "codestral-2501"
  api_key = "$MISTRAL_API_KEY"

  # Google Gemini (OpenAI-compatible endpoint)
  [alias.gemini-flash]
  slot = "google-gemini"
  model = "gemini-2.0-flash"
  api_key = "$GEMINI_API_KEY"

  [alias.gemini-pro]
  slot = "google-gemini"
  model = "gemini-2.5-pro-exp-03-25"
  api_key = "$GEMINI_API_KEY"

  # Cohere
  [alias.command-r]
  slot = "cohere"
  model = "command-r7b-12-2024"
  api_key = "$COHERE_API_KEY"

  # Moonshot (Kimi)
  [alias.kimi]
  slot = "moonshot"
  model = "moonshotai/kimi-k2.6"
  api_key = "$MOONSHOT_API_KEY"

  # Local — Ollama
  [alias.ollama-llama]
  slot = "ollama"
  model = "llama3.3:70b"
  api_key = ""        # local, no key needed

  [alias.ollama-phi]
  slot = "ollama"
  model = "phi4:14b"
  api_key = ""

  # Local — LM Studio
  [alias.lmstudio]
  slot = "lm-studio"
  model = "local-model"
  api_key = ""

  # Local — vLLM
  [alias.vllm]
  slot = "vllm"
  model = "local-model"
  api_key = ""

# ── Custom Providers ───────────────────────────────────
# OpenAI-compatible endpoints not in the built-in catalog.
# Model metadata can be specified; if empty, models are fetched via API.

[custom]

  [custom.my-llm]
  base_url = "https://my-llm.example.com/v1"
  api_key = "$MY_LLM_KEY"
  models = ["my-model-v1", "my-model-v2"]

  [custom.my-llm.model_meta."my-model-v1"]
  context_window = 128000
  max_output_tokens = 16384
  cost_per_1m_input = 1.0
  cost_per_1m_output = 3.0
  suitable_for = ["general", "coding"]

  [custom.my-llm.model_meta."my-model-v2"]
  context_window = 32000
  max_output_tokens = 4096
  cost_per_1m_input = 0.5
  cost_per_1m_output = 1.5
  suitable_for = ["fast", "general"]
